<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Admin Todo Golosina</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fce4ec; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Roboto', sans-serif; }
    .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(254, 57, 148, 0.2); border: none; }
    .btn-pink { background-color: #fe3994; color: white; border-radius: 50px; font-weight: 600; }
    .btn-pink:hover { background-color: #d82b7b; color: white; }
    .brand-icon { font-size: 4rem; line-height: 1; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div class="brand-icon mb-2">
            <svg width="1em" height="1em" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <mask id="biteMaskAlf">
                  <rect x="0" y="0" width="100" height="100" fill="white" />
                  <circle cx="85" cy="45" r="22" fill="black" />
                </mask>
              </defs>
              <g mask="url(#biteMaskAlf)">
                <rect x="10" y="60" width="80" height="16" rx="8" fill="#e5c158"/>
                <rect x="14" y="45" width="72" height="18" fill="#6d3b14"/>
                <rect x="10" y="32" width="80" height="16" rx="8" fill="#e5c158"/>
              </g>
            </svg>
          </div>
          <h2 class="fw-bold">Todo Golosina</h2>
          <p class="text-muted small">Panel de Administración</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} small rounded-4">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Usuario</label>
            <input type="text" name="username" class="form-control rounded-pill px-3" required autofocus placeholder="ej: admin">
          </div>
          <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Contraseña</label>
            <input type="password" name="password" class="form-control rounded-pill px-3" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-pink w-100 py-2">Ingresar al Panel</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
